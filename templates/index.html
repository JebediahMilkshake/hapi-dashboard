<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Family Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="dashboard-layout">
        <aside id="sidebar">
            <div id="clock-section">
                <div id="clock-container">
                    <span id="clock-time">00:00</span>
                    <span id="clock-ampm">--</span>
                </div>
                <div id="digital-date">Loading...</div>
            </div>
            <div id="planner"><div id="event-list"></div></div>
            <div id="version-tag">Loading version...</div>
        </aside>

        <div id="main-column">
            <header id="weather-bar">
                <div id="current-weather">
                    <div id="weather-main-icon"></div>
                    <div id="weather-temp">--°</div>
                    <div id="weather-condition">---</div>
                </div>
                <div id="forecast-grid"></div>
            </header>
            <main id="calendar-view">
                <h1 id="month-header"></h1>
                <div id="grid"></div>
            </main>
            <footer id="docked-legend"></footer>
        </div>
    </div>

    <script>
        let lastUpdate = Date.now();
        document.addEventListener('contextmenu', e => e.preventDefault());

        function getLocalDateStr(d) {
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        }

        function updateClock() {
            const now = new Date();
            let h = now.getHours();
            const m = String(now.getMinutes()).padStart(2, '0');
            const ampm = h >= 12 ? 'PM' : 'AM';
            h = h % 12 || 12;
            document.getElementById('clock-time').innerText = `${h}:${m}`;
            document.getElementById('clock-ampm').innerText = ampm;
            
            const options = { weekday: 'short', month: 'long', day: 'numeric' };
            document.getElementById('digital-date').innerText = now.toLocaleDateString(undefined, options).toUpperCase();

            // WATCHDOG: If dashboard hasn't fetched data in 2 mins, force reload
            if (Date.now() - lastUpdate > 120000) { location.reload(); }
        }

        async function updateDashboard() {
            try {
                const res = await fetch('/api/data');
                const data = await res.json();
                lastUpdate = Date.now();

                // 1. Weather
                document.getElementById('weather-main-icon').innerHTML = `<i data-lucide="sun" style="width:7vh;height:7vh"></i>`; // Placeholder logic
                document.getElementById('weather-temp').innerText = `${Math.round(data.weather.attributes.temperature)}°`;

                // 2. Rolling Calendar Grid (6 weeks)
                const grid = document.getElementById('grid');
                grid.replaceChildren(); // Memory-safe clear
                const now = new Date();
                const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);
                const startDay = startOfMonth.getDay(); 
                const startDate = new Date(now.getFullYear(), now.getMonth(), 1 - (startDay + 7)); // Buffer Week

                for (let i = 0; i < 42; i++) {
                    const d = new Date(startDate);
                    d.setDate(startDate.getDate() + i);
                    const dStr = getLocalDateStr(d);
                    const isCurrent = d.getMonth() === now.getMonth();
                    
                    grid.insertAdjacentHTML('beforeend', `
                        <div class="day-cell ${isCurrent ? '' : 'other-month'} ${dStr === getLocalDateStr(now) ? 'today' : ''}">
                            <div class="day-number">${d.getDate()}</div>
                            <div class="cell-events"></div>
                        </div>`);
                }

                lucide.createIcons();
            } catch (e) { console.error("Update failed", e); }
        }

        setInterval(updateClock, 1000);
        setInterval(updateDashboard, 30000);
        updateDashboard();
        fetch('/api/version').then(r => r.json()).then(d => document.getElementById('version-tag').innerText = `v.${d.version}`);
    </script>
</body>
</html>
