<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAPi Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <!-- Lucide icons are lightweight and performant -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="dashboard-layout">
        <aside id="sidebar">
            <div id="clock-section">
                <div id="connection-warning" class="hidden">
                    <i data-lucide="cloud-off" style="width: 5vmin; height: 5vmin;"></i>
                    <p style="margin-top: 1vmin;">OFFLINE</p>
                </div>
                <div id="clock-container">
                    <span id="clock-time">--:--</span><span id="clock-ampm">--</span>
                </div>
                <div id="digital-date">Loading...</div>
            </div>
            
            <div id="planner">
                <div id="event-list">
                    <div class="spinner"></div>
                </div>
            </div>
        </aside>

        <div id="main-column">
            <header id="weather-bar">
                <div id="current-weather">
                    <div id="weather-main-icon"><div class="spinner"></div></div>
                    <div id="weather-details">
                        <div id="weather-temp">--°</div>
                        <div id="weather-condition">LOADING...</div>
                    </div>
                </div>
                <div id="forecast-grid">
                    <div class="spinner"></div>
                </div>
            </header>

            <main id="calendar-view">
                <h1 id="month-header">LOADING...</h1>
                <div id="grid">
                    <!-- Day headers injected here -->
                    <div class="spinner"></div>
                </div>
            </main>

            <footer id="docked-legend">
                <div class="spinner"></div>
            </footer>
        </div>
    </div>

    <script>
        // Force cursor hiding by moving it off-screen on mousemove
        let hideCursorTimeout;
        document.addEventListener('mousemove', () => {
            document.body.style.cursor = 'none';
            clearTimeout(hideCursorTimeout);
            hideCursorTimeout = setTimeout(() => {
                document.body.style.cursor = 'none';
            }, 100);
        });
        document.addEventListener('mouseleave', () => {
            document.body.style.cursor = 'none';
        });

        // Helper function for ordinal numbers
        function getOrdinal(d) {
            if (d > 3 && d < 21) return 'th';
            switch (d % 10) {
                case 1:  return "st";
                case 2:  return "nd";
                case 3:  return "rd";
                default: return "th";
            }
        }

        // Helper function to get YYYY-MM-DD string
        function getLocalDateStr(dateObj) {
            const y = dateObj.getFullYear();
            const m = String(dateObj.getMonth() + 1).padStart(2, '0');
            const d = String(dateObj.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        // Update clock and date display
        function updateClock() {
            const now = new Date();
            let hours = now.getHours();
            const mins = String(now.getMinutes()).padStart(2, '0');
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12 || 12; // Convert to 12-hour format

            document.getElementById('clock-time').textContent = `${hours}:${mins}`;
            document.getElementById('clock-ampm').textContent = ampm;

            const dayName = now.toLocaleDateString([], { weekday: 'short' });
            const monthName = now.toLocaleDateString([], { month: 'long' });
            const dateNum = now.getDate();
            document.getElementById('digital-date').textContent = `${dayName} ${monthName} ${dateNum}${getOrdinal(dateNum)}`;
        }

        // Map Home Assistant weather conditions to Lucide icons
        function getWeatherIcon(condition, sizeClass = '') {
            if (!condition) return '<i data-lucide="help-circle"></i>';
            const iconMap = {
                'sunny': 'sun',
                'clearnight': 'moon',
                'cloudy': 'cloud',
                'fog': 'cloud-fog',
                'hail': 'cloud-hail',
                'lightning': 'zap',
                'lightningrain': 'cloud-lightning',
                'partlycloudy': 'cloud-sun',
                'pouring': 'cloud-rain-wind',
                'rainy': 'cloud-rain',
                'snowy': 'cloud-snow',
                'snowyrainy': 'cloud-snow',
                'windy': 'wind'
            };
            const iconName = iconMap[condition.toLowerCase().replace(/-/g, '')] || 'help-circle';
            return `<i data-lucide="${iconName}" class="${sizeClass}"></i>`;
        }

        // Sort events by time, then all-day events by priority
        function sortEvents(events) {
            const timed = events.filter(e => e.start.dateTime);
            const allDay = events.filter(e => e.start.date);
            timed.sort((a, b) => new Date(a.start.dateTime) - new Date(b.start.dateTime));
            allDay.sort((a, b) => (a.priority || 99) - (b.priority || 99)); // Lower priority number is higher priority
            return [...timed, ...allDay];
        }

        // Main function to fetch and update dashboard data
        async function updateDashboard() {
            try {
                const response = await fetch('/api/data');
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const data = await response.json();
                
                // Hide connection warning
                document.getElementById('connection-warning').classList.add('hidden');

                // Apply theme
                document.body.className = data.dark_mode ? '' : 'light-theme';

                // Weather & Forecast
                document.getElementById('weather-main-icon').innerHTML = getWeatherIcon(data.weather.state, 'large-icon');
                document.getElementById('weather-temp').textContent = `${Math.round(data.weather.attributes.temperature)}°`;
                document.getElementById('weather-condition').textContent = data.weather.state.toUpperCase().replace(/-/g, ' ');

                document.getElementById('forecast-grid').innerHTML = data.forecast.map(day => `
                    <div class="forecast-day">
                        <div class="f-name">${new Date(day.datetime).toLocaleDateString([], {weekday:'short'}).toUpperCase()}</div>
                        <div class="f-icon">${getWeatherIcon(day.condition)}</div>
                        <div class="f-temp">${Math.round(day.temperature)}°</div>
                    </div>
                `).join('');

                // Planner (Sidebar Event List)
                const eventList = document.getElementById('event-list');
                eventList.innerHTML = ''; // Clear previous events
                const now = new Date();
                const todayStr = getLocalDateStr(now);
                const plannerDaysToShow = 7; // As per config.py suggestion

                for (let i = 0; i < plannerDaysToShow; i++) {
                    const tDate = new Date();
                    tDate.setDate(now.getDate() + i);
                    const tStr = getLocalDateStr(tDate);
                    
                    const dayEvents = sortEvents(data.events.filter(e => {
                        const eventDate = e.start.date || (e.start.dateTime ? getLocalDateStr(new Date(e.start.dateTime)) : null);
                        return eventDate === tStr;
                    }));
                    
                    const label = i === 0 ? "TODAY" : tDate.toLocaleDateString('default', { weekday:'short', day:'numeric' }).toUpperCase();
                    eventList.insertAdjacentHTML('beforeend', `<div class="planner-date-header">${label}</div>`);
                    
                    if (dayEvents.length === 0) {
                        eventList.insertAdjacentHTML('beforeend', `<div class="event-item no-events" style="border-left-color: var(--border);"><div class="title">No Events</div></div>`);
                    } else {
                        dayEvents.forEach(e => {
                            const time = e.start.date ? "ALL DAY" : new Date(e.start.dateTime).toLocaleTimeString([], {hour:'numeric', minute:'2-digit'}).replace(' ', '').toLowerCase();
                            eventList.insertAdjacentHTML('beforeend', `
                                <div class="event-item" style="border-left-color:${e.color}">
                                    <div class="time">${time}</div>
                                    <div class="title">${e.summary}</div>
                                </div>`);
                        });
                    }
                }

                // Legend
                document.getElementById('docked-legend').innerHTML = data.legend.map(item => `
                    <div class="key-item"><span class="dot" style="background:${item.color}"></span> ${item.name.toUpperCase()}</div>
                `).join('');

                // Calendar Grid
                const calendarGrid = document.getElementById('grid');
                calendarGrid.innerHTML = ''; // Clear previous grid
                
                // Add day headers
                ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'].forEach(d => {
                    calendarGrid.insertAdjacentHTML('beforeend', `<div class="day-header">${d}</div>`);
                });

                const firstDayOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);
                const startingDay = firstDayOfMonth.getDay(); // 0 for Sunday, 1 for Monday, etc.

                // Calculate start date to always show a full 6-week grid
                const startDate = new Date(firstDayOfMonth);
                startDate.setDate(firstDayOfMonth.getDate() - startingDay); // Go back to the first day of the week

                const totalCells = 42; // 6 weeks * 7 days
                document.getElementById('month-header').textContent = now.toLocaleDateString('default', { month: 'long', year: 'numeric' }).toUpperCase();

                for (let i = 0; i < totalCells; i++) {
                    const currentDay = new Date(startDate);
                    currentDay.setDate(startDate.getDate() + i);
                    const currentDayStr = getLocalDateStr(currentDay);

                    const isToday = currentDayStr === todayStr;
                    const isOtherMonth = currentDay.getMonth() !== now.getMonth();

                    const dayEvents = sortEvents(data.events.filter(e => {
                        const eventDate = e.start.date || (e.start.dateTime ? getLocalDateStr(new Date(e.start.dateTime)) : null);
                        return eventDate === currentDayStr;
                    }));

                    // Limit events displayed in grid cells for performance and minimalism
                    const maxEventsPerCell = 2; 
                    const timedEvents = dayEvents.filter(e => e.start.dateTime).slice(0, maxEventsPerCell);
                    const allDayEvents = dayEvents.filter(e => e.start.date);
                    
                    let filteredAllDay = [];
                    if (allDayEvents.length > 0) {
                        // Show highest priority all-day events first
                        const highestPriority = Math.min(...allDayEvents.map(e => e.priority || 99));
                        filteredAllDay = allDayEvents.filter(e => (e.priority || 99) === highestPriority).slice(0, 1); // Limit to 1
                    }
                    
                    let eventsHtml = '';
                    filteredAllDay.forEach(e => {
                        eventsHtml += `<div class="cell-event all-day-row" style="border-left-color:${e.color}">${e.summary}</div>`;
                    });
                    timedEvents.forEach(e => {
                        const time = new Date(e.start.dateTime).toLocaleTimeString([], {hour:'numeric', minute:'2-digit'}).replace(' ', '').toLowerCase();
                        eventsHtml += `<div class="cell-event" style="border-left-color:${e.color}"><span class="cell-time">${time}</span> ${e.summary}</div>`;
                    });

                    calendarGrid.insertAdjacentHTML('beforeend', `
                        <div class="day-cell ${isOtherMonth ? 'other-month' : ''} ${isToday ? 'today' : ''}">
                            <div class="day-number">${currentDay.getDate()}</div>
                            <div class="cell-events">${eventsHtml}</div>
                        </div>`);
                }

                // Render Lucide icons after new HTML is injected
                lucide.createIcons();

            } catch (error) {
                console.error('Failed to update dashboard:', error);
                document.getElementById('connection-warning').classList.remove('hidden');
                // Optionally clear dynamic content and show loading spinners
                document.getElementById('event-list').innerHTML = '<div class="spinner"></div>';
                document.getElementById('weather-main-icon').innerHTML = '<div class="spinner"></div>';
                document.getElementById('forecast-grid').innerHTML = '<div class="spinner"></div>';
                document.getElementById('grid').innerHTML = '<div class="spinner"></div>';
                document.getElementById('docked-legend').innerHTML = '<div class="spinner"></div>';
                document.getElementById('month-header').textContent = 'CONNECTION ERROR';
                document.getElementById('weather-temp').textContent = '--°';
                document.getElementById('weather-condition').textContent = 'ERROR';
            }
        }

        // Initial calls and interval setup
        updateClock();
        updateDashboard(); // Initial data load

        setInterval(updateClock, 1000); // Update clock every second
        setInterval(updateDashboard, 60000); // Update dashboard data every minute (adjusted from 30s to 60s for less load)

        // Function to update version (might be useful for debugging)
        // Leaving it out for now to reduce initial load, but can be added back if desired.

            try {
                const res = await fetch('/api/version');
                const data = await res.json();
                // Find a suitable place to display this, e.g., a hidden footer
                // document.getElementById('version-tag').textContent = `v.${data.version}`;
            } catch (e) {
                console.error('Failed to fetch version:', e);
            }
        }
        // updateVersion();
        */
    </script>
</body>
</html>
