<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Family Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="dashboard-layout">
        <aside id="sidebar">
            <div id="clock-section">
                <div id="status-overlay">
                    <div id="connection-warning" class="hidden"><i data-lucide="plug-zap-2"></i></div>
                </div>
                <div id="clock-container">
                    <span id="clock-time">00:00</span>
                    <span id="clock-ampm">--</span>
                </div>
                <div id="digital-date">Loading...</div>
            </div>
            
            <div id="planner">
                <h3>DAILY VIEW</h3>
                <div id="event-list"></div>
            </div>
        </aside>

        <div id="main-column">
            <header id="weather-bar">
                <div id="current-weather">
                    <div id="weather-main-icon"></div>
                    <div id="weather-temp">--°</div>
                    <div id="weather-condition">LOADING...</div>
                </div>
                <div id="forecast-grid"></div>
            </header>

            <main id="calendar-view">
                <h1 id="month-header"></h1>
                <div id="grid"></div>
            </main>

            <footer id="docked-legend"></footer>
        </div>
    </div>

    <script>
        function getOrdinal(d) {
            if (d > 3 && d < 21) return 'th';
            switch (d % 10) {
                case 1:  return "st";
                case 2:  return "nd";
                case 3:  return "rd";
                default: return "th";
            }
        }

        function getLocalDateStr(dateObj) {
            const y = dateObj.getFullYear();
            const m = String(dateObj.getMonth() + 1).padStart(2, '0');
            const d = String(dateObj.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        function updateClock() {
            const now = new Date();
            let hours = now.getHours();
            const mins = String(now.getMinutes()).padStart(2, '0');
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12 || 12;
            document.getElementById('clock-time').innerText = `${hours}:${mins}`;
            document.getElementById('clock-ampm').innerText = ampm;

            const dayName = now.toLocaleDateString([], { weekday: 'short' });
            const monthName = now.toLocaleDateString([], { month: 'long' });
            const dateNum = now.getDate();
            document.getElementById('digital-date').innerText = `${dayName} ${monthName} ${dateNum}${getOrdinal(dateNum)}`;
        }

        function getEventDateOnly(eventTime) {
            if (eventTime.length === 10) return eventTime;
            const d = new Date(eventTime);
            return getLocalDateStr(d);
        }

        // Logical Sorting: Timed (Chronological) -> All Day (Priority)
        function sortEvents(events) {
            const timed = events.filter(e => e.start.dateTime);
            const allDay = events.filter(e => e.start.date);
            timed.sort((a, b) => new Date(a.start.dateTime) - new Date(b.start.dateTime));
            allDay.sort((a, b) => (a.priority || 99) - (b.priority || 99));
            return [...timed, ...allDay];
        }

        function getWeatherIcon(condition, isLarge = false) {
            if(!condition) return '<i data-lucide="help-circle"></i>';
            const icons = {
                'sunny': 'sun', 'clearnight': 'moon', 'cloudy': 'cloud', 'fog': 'cloud-fog',
                'hail': 'cloud-hail', 'lightning': 'zap', 'lightningrain': 'cloud-lightning',
                'partlycloudy': 'cloud-sun', 'pouring': 'cloud-rain-wind', 'rainy': 'cloud-rain',
                'snowy': 'cloud-snow', 'snowyrainy': 'cloud-snow', 'windy': 'wind'
            };
            const size = isLarge ? 'style="width: 7vh; height: 7vh;"' : '';
            return `<i data-lucide="${icons[condition.toLowerCase().replace(/-/g, '')] || 'help-circle'}" ${size}></i>`;
        }

        async function updateDashboard() {
            try {
                const response = await fetch('/api/data');
                const data = await response.json();
                document.getElementById('connection-warning').classList.add('hidden');
                document.body.className = data.dark_mode ? '' : 'light-theme';

                // Weather
                document.getElementById('weather-main-icon').innerHTML = getWeatherIcon(data.weather.state, true);
                document.getElementById('weather-temp').innerText = `${Math.round(data.weather.attributes.temperature)}°`;
                document.getElementById('weather-condition').innerText = data.weather.state.toUpperCase().replace(/-/g, ' ');

                // Legend
                document.getElementById('docked-legend').innerHTML = data.legend.map(item => `
                    <div class="key-item"><span class="dot" style="background:${item.color}"></span> ${item.name.toUpperCase()}</div>
                `).join('');

                // 6-Row Grid Logic
                const grid = document.getElementById('grid');
                const now = new Date();
                const todayStr = getLocalDateStr(now);
                document.getElementById('month-header').innerText = now.toLocaleString('default', { month: 'long', year: 'numeric' }).toUpperCase();
                
                grid.innerHTML = '';
                ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'].forEach(d => grid.insertAdjacentHTML('beforeend', `<div class="day-header">${d}</div>`));

                const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);
                let startDayOfWeek = startOfMonth.getDay();
                if (startDayOfWeek === 0) startDayOfWeek = 7; // Edge case: start on Sunday
                
                const calendarDays = [];
                for (let i = startDayOfWeek; i > 0; i--) {
                    const d = new Date(now.getFullYear(), now.getMonth(), 1 - i);
                    calendarDays.push({ d: d.getDate(), m: d.getMonth(), y: d.getFullYear(), current: false });
                }
                const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
                for (let i = 1; i <= daysInMonth; i++) {
                    calendarDays.push({ d: i, m: now.getMonth(), y: now.getFullYear(), current: true });
                }
                const remaining = 42 - calendarDays.length;
                for (let i = 1; i <= remaining; i++) {
                    const d = new Date(now.getFullYear(), now.getMonth() + 1, i);
                    calendarDays.push({ d: d.getDate(), m: d.getMonth(), y: d.getFullYear(), current: false });
                }

                calendarDays.forEach(day => {
                    const dStr = `${day.y}-${String(day.m+1).padStart(2,'0')}-${String(day.d).padStart(2,'0')}`;
                    const dayEvents = sortEvents(data.events.filter(e => getEventDateOnly(e.start.date || e.start.dateTime) === dStr));
                    
                    let eventHtml = dayEvents.slice(0, 4).map(e => {
                        const time = e.start.dateTime ? new Date(e.start.dateTime).toLocaleTimeString([], {hour:'numeric', minute:'2-digit'}).replace(' ', '').toLowerCase() : '';
                        const isAllDay = e.start.date ? 'all-day-row' : '';
                        return `<div class="cell-event ${isAllDay}" style="border-left-color:${e.color}"><span class="cell-time">${time}</span> ${e.summary}</div>`;
                    }).join('');

                    grid.insertAdjacentHTML('beforeend', `
                        <div class="day-cell ${!day.current ? 'other-month' : ''} ${dStr === todayStr ? 'today' : ''}">
                            <div class="day-number">${day.d}</div>
                            <div class="cell-events">${eventHtml}</div>
                        </div>`);
                });

                // Planner Restored
                const eventList = document.getElementById('event-list');
                eventList.innerHTML = '';
                for (let i = 0; i < 7; i++) {
                    const tDate = new Date(); tDate.setDate(tDate.getDate() + i);
                    const tStr = getLocalDateStr(tDate);
                    const dayEvents = sortEvents(data.events.filter(e => getEventDateOnly(e.start.date || e.start.dateTime) === tStr));
                    const label = i === 0 ? "TODAY" : tDate.toLocaleDateString('default', { weekday:'short', day:'numeric' }).toUpperCase();
                    eventList.insertAdjacentHTML('beforeend', `<div class="planner-date-header">${label}</div>`);
                    if(dayEvents.length === 0) eventList.insertAdjacentHTML('beforeend', `<div class="event-item no-events">No Events</div>`);
                    dayEvents.forEach(e => {
                        const time = e.start.date ? "ALL DAY" : new Date(e.start.dateTime).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                        eventList.insertAdjacentHTML('beforeend', `<div class="event-item" style="border-left-color:${e.color}"><div class="time">${time}</div><div class="title">${e.summary}</div></div>`);
                    });
                }

                // Forecast
                document.getElementById('forecast-grid').innerHTML = data.forecast.map(day => `
                    <div class="forecast-day">
                        <div class="f-name">${new Date(day.datetime).toLocaleDateString([], {weekday:'short'}).toUpperCase()}</div>
                        <div class="f-icon">${getWeatherIcon(day.condition)}</div>
                        <div class="f-temp">${Math.round(day.temperature)}°</div>
                    </div>
                `).join('');

                lucide.createIcons();
            } catch (e) { 
                document.getElementById('connection-warning').classList.remove('hidden');
                lucide.createIcons();
            }
        }
        setInterval(updateClock, 1000);
        setInterval(updateDashboard, 30000);
        updateClock(); updateDashboard();
    </script>
</body>
</html>
