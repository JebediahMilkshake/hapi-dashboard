<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Family Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="dashboard-layout">
        <aside id="sidebar">
            <div id="clock-section">
                <div id="clock-container">
                    <span id="clock-time">00:00</span>
                    <span id="clock-ampm">--</span>
                </div>
                <div id="digital-date">Loading...</div>
            </div>
            <div id="planner"><div id="event-list"></div></div>
            <div id="version-tag">Loading...</div>
        </aside>

        <div id="main-column">
            <header id="weather-bar">
                <div id="current-weather">
                    <div id="weather-main-icon"></div>
                    <div id="weather-temp">--°</div>
                    <div id="weather-condition">---</div>
                </div>
                <div id="forecast-grid"></div>
            </header>
            <main id="calendar-view">
                <h1 id="month-header"></h1>
                <div id="grid"></div>
            </main>
            <footer id="docked-legend"></footer>
        </div>
    </div>

    <script>
        let lastSuccess = Date.now();
        document.addEventListener('contextmenu', e => e.preventDefault());

        function getLocalDateStr(d) {
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        }

        function updateClock() {
            const now = new Date();
            let h = now.getHours();
            const m = String(now.getMinutes()).padStart(2, '0');
            const ampm = h >= 12 ? 'PM' : 'AM';
            h = h % 12 || 12;
            document.getElementById('clock-time').innerText = `${h}:${m}`;
            document.getElementById('clock-ampm').innerText = ampm;
            
            const options = { weekday: 'short', month: 'long', day: 'numeric' };
            document.getElementById('digital-date').innerText = now.toLocaleDateString(undefined, options).toUpperCase();

            // WATCHDOG: Refresh page if frozen for > 5 mins
            if (Date.now() - lastSuccess > 300000) location.reload();
        }

        function getWeatherIcon(cond) {
            const icons = { 'sunny': 'sun', 'cloudy': 'cloud', 'rainy': 'cloud-rain', 'partlycloudy': 'cloud-sun' };
            return `<i data-lucide="${icons[cond?.toLowerCase()] || 'help-circle'}"></i>`;
        }

        async function updateDashboard() {
            try {
                const res = await fetch('/api/data?t=' + Date.now());
                if (!res.ok) throw new Error("API Offline");
                const data = await res.json();
                lastSuccess = Date.now();

                // 1. Weather Update (Defensive)
                const temp = data.weather?.attributes?.temperature;
                if (temp !== undefined) {
                    document.getElementById('weather-temp').innerText = `${Math.round(temp)}°`;
                    document.getElementById('weather-condition').innerText = (data.weather.state || '---').toUpperCase();
                    document.getElementById('weather-main-icon').innerHTML = getWeatherIcon(data.weather.state);
                }

                // 2. Forecast Update
                const fGrid = document.getElementById('forecast-grid');
                if (data.forecast && Array.isArray(data.forecast)) {
                    fGrid.innerHTML = data.forecast.slice(0, 5).map(day => `
                        <div class="forecast-day">
                            <div class="f-name">${new Date(day.datetime).toLocaleDateString([], {weekday:'short'}).toUpperCase()}</div>
                            <div class="f-icon">${getWeatherIcon(day.condition)}</div>
                            <div class="f-temp">${Math.round(day.temperature)}°</div>
                        </div>
                    `).join('');
                }

                // 3. Planner & Rolling Calendar Grid
                const grid = document.getElementById('grid');
                grid.replaceChildren(); // Safe clear
                const now = new Date();
                const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);
                const startDate = new Date(now.getFullYear(), now.getMonth(), 1 - (startOfMonth.getDay() + 7)); // Buffer week

                for (let i = 0; i < 42; i++) {
                    const d = new Date(startDate); d.setDate(startDate.getDate() + i);
                    const dStr = getLocalDateStr(d);
                    const isCurrent = d.getMonth() === now.getMonth();
                    
                    grid.insertAdjacentHTML('beforeend', `
                        <div class="day-cell ${isCurrent ? '' : 'other-month'} ${dStr === getLocalDateStr(now) ? 'today' : ''}">
                            <div class="day-number">${d.getDate()}</div>
                            <div class="cell-events"></div>
                        </div>`);
                }

                lucide.createIcons();
            } catch (e) {
                console.error("Dashboard error:", e);
                document.getElementById('version-tag').innerText = "Reconnect Error...";
            }
        }

        setInterval(updateClock, 1000);
        setInterval(updateDashboard, 30000);
        updateDashboard();
        fetch('/api/version').then(r => r.json()).then(d => document.getElementById('version-tag').innerText = `v.${d.version}`);
    </script>
</body>
</html>
